version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=super-secret-jwt-key-for-local-development-12345
      - DB_PATH=/usr/src/app/data/database.sqlite
    volumes:
      - sqlite-data:/usr/src/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  sqlite-data:
